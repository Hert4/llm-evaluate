# HTKH Intent Routing Benchmark
# Source: htkh_eval_datasets/htkh_intent_routing.json
# Input:  tin nhắn mới nhất của user
# Context: conversation_history serialized thành "User: ...\nBot: ..."
# Output: route label (rag_answer | human_handoff | clarify | chitchat)
# GT:     gpt-5.2 chọn route dựa vào toàn bộ ngữ cảnh hội thoại

task_name: htkh_intent_routing
task_type: qa
source_file: htkh_intent_routing.json
max_samples: 0  # 154 samples — giữ hết
description: "HTKH — Route intent: rag_answer / human_handoff / clarify / chitchat"

# context_from: conversation_history — script sẽ serialize conversation_history thành context string
context_from: conversation_history

# Ground truth generation config
gt_prompt: |
  Bạn là chuyên gia thiết kế chatbot hỗ trợ phần mềm MISA.

  Xem conversation history và tin nhắn mới nhất, chọn route phù hợp:
  - rag_answer: Bot tự trả lời được từ knowledge base (câu hỏi kỹ thuật cụ thể về phần mềm)
  - human_handoff: Cần chuyển sang nhân viên thật (user yêu cầu gặp người, thất vọng, vấn đề phức tạp)
  - clarify: Cần hỏi thêm thông tin trước khi trả lời (câu hỏi quá mơ hồ, thiếu ngữ cảnh)
  - chitchat: Chào hỏi, không liên quan đến phần mềm MISA

  Conversation history:
  {context}

  Tin nhắn mới nhất: {input}

  Trả lời CHỈ một trong bốn: rag_answer, human_handoff, clarify, chitchat
  Không giải thích, không thêm gì khác.

gt_task_type: qa
gt_metrics:
  - accuracy
  - token_f1

# Prompt gửi đến model cần đánh giá (inference)
# context = conversation_history đã được serialize
inference_prompt: |
  Xem conversation history và tin nhắn mới nhất, chọn route:
  - rag_answer: Câu hỏi kỹ thuật về phần mềm, bot tự trả lời được
  - human_handoff: Cần nhân viên thật
  - clarify: Cần hỏi thêm trước khi trả lời
  - chitchat: Chào hỏi / không liên quan MISA

  Conversation history:
  {context}

  Tin nhắn mới nhất: {input}

  Trả lời CHỈ một trong bốn: rag_answer, human_handoff, clarify, chitchat
